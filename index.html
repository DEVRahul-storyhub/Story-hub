<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryHub - Likho Dil ki Baat</title>
    <style>
        :root { 
            --primary: #0095f6; 
            --bg: #fafafa; 
            --border: #dbdbdb; 
            --text: #262626; 
        }
        body { font-family: system-ui; margin: 0; background: var(--bg); color: var(--text); }
        .navbar { 
            background: white; padding: 0 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; height: 60px; 
        }
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
        button.secondary { background: #efefef; color: black; }
        .post-header { display: flex; align-items: center; margin-bottom: 12px; font-weight: 600; }
        .feed-avatar { width: 34px; height: 34px; border-radius: 50%; margin-right: 10px; }
        .post-img { width: calc(100% + 40px); margin: 10px -20px; display: block; }
        .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .filter-chip { white-space: nowrap; padding: 6px 15px; border-radius: 20px; background: white; border: 1px solid var(--border); cursor: pointer; }
        .filter-chip.active { background: var(--text); color: white; }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-weight:800;">StoryHub 📝</div>
    <div id="navUser"></div>
</div>

<div class="container">
    <!-- Auth Box -->
    <div class="card" id="authBox">
        <h2>Login / Sign Up</h2>
        <input id="u_name" placeholder="Username (No space)">
        <input id="u_pass" type="password" placeholder="Password (Min 6 chars)">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button onclick="appLogin()">Login</button>
            <button class="secondary" onclick="appSignup()">Sign Up</button>
        </div>
    </div>

    <!-- Post Box -->
    <div class="card" id="postBox" style="display:none;">
        <input id="p_title" placeholder="Title">
        <select id="p_cat">
            <option value="General">General</option>
            <option value="Comedy">Comedy</option>
            <option value="Fiction">Fiction</option>
            <option value="Horror">Horror</option>
        </select>
        <textarea id="p_content" rows="3" placeholder="Apni kahani likho..."></textarea>
        <input type="file" id="p_file" accept="image/*">
        <button onclick="handlePost()" style="width:100%">Post Story</button>
    </div>

    <div class="filter-bar" id="categoryFilters">
        <div class="filter-chip active" onclick="filterFeed('All', this)">All</div>
    </div>

    <div id="postFeed">Loading stories...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // APNI CONFIG YAHAN RAKHEIN
    const firebaseConfig = {
        apiKey: "AIzaSyCzq2CZZhYFAh0hO-WoSb15yQGMb_9ECK8",
        authDomain: "devrahul-storyhub.firebaseapp.com",
        databaseURL: "https://devrahul-storyhub-default-rtdb.firebaseio.com/",
        projectId: "devrahul-storyhub",
        storageBucket: "devrahul-storyhub.firebasestorage.app",
        messagingSenderId: "889951778018",
        appId: "1:889951778018:web:7a01d97f72c016601d1abb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const postsRef = ref(db, 'posts');

    let currentUser = null;
    let currentFilter = "All";

    // --- AUTH LOGIC ---
    window.appSignup = async () => {
        const u = document.getElementById("u_name").value.trim();
        const p = document.getElementById("u_pass").value;
        if(u.length < 3) return alert("Username chota hai");
        
        try {
            const res = await createUserWithEmailAndPassword(auth, u + "@storyhub.com", p);
            await updateProfile(res.user, { displayName: u });
            alert("Account ban gaya!");
        } catch (e) { alert(e.message); }
    };

    window.appLogin = async () => {
        const u = document.getElementById("u_name").value.trim();
        const p = document.getElementById("u_pass").value;
        try {
            await signInWithEmailAndPassword(auth, u + "@storyhub.com", p);
        } catch (e) { alert("Galat details!"); }
    };

    window.appLogout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("authBox").style.display = "none";
            document.getElementById("postBox").style.display = "block";
            document.getElementById("navUser").innerHTML = `<b>${user.displayName}</b> <button onclick="appLogout()" class="secondary" style="padding:5px">Logout</button>`;
        } else {
            currentUser = null;
            document.getElementById("authBox").style.display = "block";
            document.getElementById("postBox").style.display = "none";
            document.getElementById("navUser").innerHTML = "";
        }
    });

    // --- POST LOGIC ---
    window.handlePost = () => {
        const t = document.getElementById("p_title").value;
        const cat = document.getElementById("p_cat").value;
        const c = document.getElementById("p_content").value;
        const file = document.getElementById("p_file").files[0];

        if(!c && !file) return alert("Kuch toh likho!");

        if(file) {
            const reader = new FileReader();
            reader.onload = () => savePost(t, cat, c, reader.result);
            reader.readAsDataURL(file);
        } else {
            savePost(t, cat, c, "");
        }
    };

    async function savePost(t, cat, c, img) {
        await push(postsRef, {
            user: currentUser.displayName,
            uid: currentUser.uid, // Security ke liye UID zaroori hai
            title: t,
            category: cat,
            content: c,
            image: img,
            timestamp: Date.now()
        });
        document.getElementById("p_content").value = "";
        document.getElementById("p_file").value = "";
    }

    // --- FEED LOGIC ---
    onValue(postsRef, (snap) => {
        const data = snap.val();
        let html = "";
        if(data) {
            const posts = Object.keys(data).map(k => ({...data[k], id: k})).reverse();
            posts.forEach(p => {
                if(currentFilter !== "All" && p.category !== currentFilter) return;
                html += `
                <div class="card">
                    <div class="post-header">
                        <img src="https://ui-avatars.com/api/?name=${p.user}&background=random" class="feed-avatar">
                        <span>${p.user}</span>
                    </div>
                    <small style="color:blue">${p.category}</small>
                    <h3>${p.title || ""}</h3>
                    <p style="white-space:pre-wrap">${p.content}</p>
                    ${p.image ? `<img src="${p.image}" class="post-img">` : ""}
                    ${currentUser && p.uid === currentUser.uid ? `<button onclick="delPost('${p.id}')" style="background:red; font-size:10px">Delete</button>` : ""}
                </div>`;
            });
        }
        document.getElementById("postFeed").innerHTML = html || "No stories yet.";
    });

    window.delPost = (id) => { if(confirm("Delete karein?")) remove(ref(db, `posts/${id}`)); };

    window.filterFeed = (cat, el) => {
        currentFilter = cat;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        // Feed automatically updates due to onValue
    };
</script>

</body>
</html>
