<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryHub - Likho Dil ki Baat</title>
    <style>
        :root { --primary: #0095f6; --bg: #fafafa; --border: #dbdbdb; --text: #262626; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); transition: all 0.5s ease; min-height: 100vh; }
        body.logged-out { background: linear-gradient(135deg, #0095f6 0%, #001f3f 100%) fixed; color: white; }
        body.logged-in { background: #121212 fixed; color: #262626; }

        .navbar { background: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; height: 60px; }
        body.logged-out .navbar { background: transparent; border-bottom: none; color: white; }

        .main-wrapper { display: flex; max-width: 900px; margin: 20px auto; gap: 20px; padding: 0 15px; }
        .sidebar { flex: 1; display: none; }
        .container { flex: 2; max-width: 500px; margin: 0; }
        @media (min-width: 800px) { .sidebar { display: block; position: sticky; top: 80px; height: fit-content; } }

        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .post-header { display: flex; align-items: center; margin-bottom: 12px; font-weight: 600; cursor: pointer; }
        .feed-avatar { width: 34px; height: 34px; border-radius: 50%; margin-right: 10px; }
        .post-img { width: calc(100% + 40px); margin: 10px -20px; display: block; }
        
        .post-actions { display: flex; gap: 15px; padding: 10px 0; border-top: 1px solid #f0f0f0; margin-top: 10px; }
        .action-btn { background: none; border: none; font-size: 16px; display: flex; align-items: center; gap: 5px; cursor: pointer; transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.9); }
        .action-btn.liked { color: #ed4956; }

        .comment-box { margin-top: 10px; border-top: 1px solid #f0f0f0; padding-top: 10px; font-size: 14px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
    </style>
</head>
<body class="logged-out">

<div class="navbar">
    <div class="nav-brand" style="font-weight: 800; cursor: pointer;" onclick="location.reload()">StoryHub 📝</div>
    <div id="navUser"></div>
</div>

<div class="main-wrapper">
    <div class="sidebar" id="sidebarArea" style="display:none;">
        <div style="background: white; padding: 15px; border-radius: 12px; border: 1px solid #dbdbdb;">
            <h4 style="margin:0 0 10px 0;">Story Writers ✍️</h4>
            <div id="writersList"></div>
        </div>
    </div>

    <div class="container">
        <div class="card" id="authBox">
            <h2>Welcome! 😊</h2>
            <input id="u_name" placeholder="Username">
            <input id="u_pass" type="password" placeholder="Password (Min 6 chars)">
            <button onclick="appLogin()" style="width:100%; margin-bottom: 5px;">Login</button>
            <button onclick="appSignup()" class="secondary" style="width:100%; background:#efefef; color:black;">Sign Up</button>
        </div>

        <div class="card" id="postBox" style="display:none;">
            <input id="p_title" placeholder="Story Title">
            <textarea id="p_content" rows="3" placeholder="Write your story..."></textarea>
            <input type="file" id="p_file" accept="image/*">
            <button id="postBtn" onclick="handlePost()" style="width: 100%;">Post Story</button>
        </div>

        <div id="postFeed"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzq2CZZhYFAh0hO-WoSb15yQGMb_9ECK8",
        authDomain: "devrahul-storyhub.firebaseapp.com",
        databaseURL: "https://devrahul-storyhub-default-rtdb.firebaseio.com/",
        projectId: "devrahul-storyhub",
        storageBucket: "devrahul-storyhub.firebasestorage.app",
        messagingSenderId: "889951778018",
        appId: "1:889951778018:web:7a01d97f72c016601d1abb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUser = null;

    // --- AUTH LOGIC ---
    window.appSignup = async () => {
        const u = document.getElementById("u_name").value;
        const p = document.getElementById("u_pass").value;
        try {
            const res = await createUserWithEmailAndPassword(auth, u + "@storyhub.com", p);
            await updateProfile(res.user, { displayName: u });
            location.reload();
        } catch (e) { alert(e.message); }
    };

    window.appLogin = async () => {
        const u = document.getElementById("u_name").value;
        const p = document.getElementById("u_pass").value;
        try { await signInWithEmailAndPassword(auth, u + "@storyhub.com", p); } catch (e) { alert("Login Failed!"); }
    };

    window.appLogout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.body.classList.replace("logged-out", "logged-in");
            document.getElementById("authBox").style.display = "none";
            document.getElementById("postBox").style.display = "block";
            document.getElementById("sidebarArea").style.display = "block";
            document.getElementById("navUser").innerHTML = `<span style="margin-right:10px; color:#262626; font-weight:600">${user.displayName}</span><button onclick="appLogout()">Logout</button>`;
            startListening();
        }
    });

    // --- REALTIME DATA LOGIC ---
    function startListening() {
        onValue(ref(db, 'posts'), (snap) => {
            const data = snap.val();
            renderFeed(data);
            renderWriters(data);
        });
    }

    function renderFeed(data) {
        if (!data) return;
        const posts = Object.keys(data).map(k => ({...data[k], id: k})).reverse();
        let html = "";
        posts.forEach(p => {
            const likesCount = p.likes ? Object.keys(p.likes).length : 0;
            const hasLiked = p.likes && p.likes[currentUser.uid];
            
            html += `
            <div class="card">
                <div class="post-header">
                    <img src="https://ui-avatars.com/api/?name=${p.user}&background=random" class="feed-avatar">
                    <span>${p.user}</span>
                </div>
                <h3>${p.title}</h3>
                <p>${p.content}</p>
                ${p.image ? `<img src="${p.image}" class="post-img">` : ""}
                <div class="post-actions">
                    <button class="action-btn ${hasLiked ? 'liked' : ''}" onclick="toggleLike('${p.id}')">
                        ${hasLiked ? '❤️' : '🤍'} <span>${likesCount}</span>
                    </button>
                    <span style="font-size:14px; margin-top:5px;">💬 ${p.comments ? Object.keys(p.comments).length : 0}</span>
                </div>
                <div class="comment-box">
                    <input id="in-${p.id}" placeholder="Write a comment..." style="padding:5px; width:75%">
                    <button onclick="postComment('${p.id}')" style="padding:5px">Post</button>
                </div>
            </div>`;
        });
        document.getElementById("postFeed").innerHTML = html;
    }

    // --- PROPER LIKE SOLUTION (Using Transaction) ---
    window.toggleLike = async (postId) => {
        if (!currentUser) return;
        
        // Immediate UI feedback (Optional)
        const likeRef = ref(db, `posts/${postId}/likes/${currentUser.uid}`);
        
        // Transaction use karne se data "Race condition" mein nahi fasta
        const snapshot = await get(likeRef);
        if (snapshot.exists()) {
            await remove(likeRef);
        } else {
            await set(likeRef, true);
        }
    };

    window.postComment = async (postId) => {
        const val = document.getElementById(`in-${postId}`).value;
        if(!val) return;
        await push(ref(db, `posts/${postId}/comments`), { user: currentUser.displayName, text: val });
        document.getElementById(`in-${postId}`).value = "";
    };

    window.handlePost = async () => {
        const t = document.getElementById("p_title").value;
        const c = document.getElementById("p_content").value;
        const f = document.getElementById("p_file").files[0];
        if(!c) return;

        const postBtn = document.getElementById("postBtn");
        postBtn.disabled = true;
        postBtn.innerText = "Posting...";

        let imgData = "";
        if(f) {
            const reader = new FileReader();
            reader.readAsDataURL(f);
            reader.onload = async () => {
                await savePost(t, c, reader.result);
                resetPostForm();
            };
        } else {
            await savePost(t, c, "");
            resetPostForm();
        }
    };

    async function savePost(title, content, img) {
        await push(ref(db, 'posts'), {
            user: currentUser.displayName, uid: currentUser.uid,
            title, content, image: img, likes: {}
        });
    }

    function resetPostForm() {
        document.getElementById("p_title").value = "";
        document.getElementById("p_content").value = "";
        document.getElementById("p_file").value = "";
        const postBtn = document.getElementById("postBtn");
        postBtn.disabled = false;
        postBtn.innerText = "Post Story";
    }

    function renderWriters(data) {
        if(!data) return;
        const counts = {};
        Object.values(data).forEach(p => counts[p.user] = (counts[p.user] || 0) + 1);
        let html = "";
        Object.entries(counts).forEach(([name, count]) => {
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:14px;">
                <span>${name}</span> <b>${count} posts</b>
            </div>`;
        });
        document.getElementById("writersList").innerHTML = html;
    }
</script>
</body>
</html>
