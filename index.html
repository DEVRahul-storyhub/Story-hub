<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryHub | Aesthetic Cloud</title>
    <style>
        /* AAPKA PURANA DESIGN WAPAS */
        :root { --primary: #0095f6; --bg: #ffffff; --border: #dbdbdb; --text: #262626; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        
        .navbar { 
            background: white; padding: 0 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100; height: 60px; 
        }
        .nav-brand { font-size: 24px; font-weight: bold; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 20px 10px; }
        
        .card { background: white; border: 1px solid var(--border); border-radius: 3px; margin-bottom: 24px; }
        .card-padding { padding: 16px; }

        input, textarea { 
            width: 100%; padding: 10px; margin: 10px 0; 
            border: 1px solid #efefef; border-radius: 4px; 
            background: #fafafa; box-sizing: border-box; 
        }
        
        button { 
            background: var(--primary); color: white; border: none; 
            padding: 7px 16px; border-radius: 4px; font-weight: 600; 
            cursor: pointer; width: 100%; font-size: 14px;
        }

        .post-header { display: flex; align-items: center; padding: 14px; font-weight: 600; border-bottom: 1px solid #efefef; }
        .feed-avatar { width: 32px; height: 32px; border-radius: 50%; margin-right: 12px; border: 1px solid var(--border); }
        
        .story-body { padding: 16px; }
        .story-title { font-size: 18px; font-weight: bold; margin: 0 0 8px 0; }
        .story-text { font-size: 14px; line-height: 1.5; white-space: pre-wrap; color: #262626; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-brand">StoryHub 🚀</div>
    <div id="navUser" style="font-size: 14px; font-weight: 600;"></div>
</div>

<div class="container">
    <!-- Login Card -->
    <div class="card" id="authBox">
        <div class="card-padding">
            <h2 style="text-align:center; margin-top:0;">Login</h2>
            <input id="u_name" placeholder="Username">
            <button onclick="appLogin()">Log In</button>
        </div>
    </div>

    <!-- Create Post Card -->
    <div class="card" id="postBox" style="display:none;">
        <div class="card-padding">
            <input id="p_title" placeholder="Title (optional)">
            <textarea id="p_content" rows="3" placeholder="Write your story..."></textarea>
            <button id="postBtn" onclick="handlePost()">Share Story</button>
        </div>
    </div>

    <div id="postFeed">
        <p style="text-align: center; color: #8e8e8e;">Connecting to cloud...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzq2CZZhYFAh0hO-WoSb15yQGMb_9ECK8",
        authDomain: "devrahul-storyhub.firebaseapp.com",
        databaseURL: "https://devrahul-storyhub-default-rtdb.firebaseio.com/",
        projectId: "devrahul-storyhub",
        storageBucket: "devrahul-storyhub.firebasestorage.app",
        messagingSenderId: "889951778018",
        appId: "1:889951778018:web:7a01d97f72c016601d1abb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const postsRef = ref(db, 'posts');

    let user = localStorage.getItem("storyUser");

    window.appLogin = () => {
        let n = document.getElementById("u_name").value.trim();
        if(n) { localStorage.setItem("storyUser", n); location.reload(); }
    };

    window.handlePost = async () => {
        let t = document.getElementById("p_title").value;
        let c = document.getElementById("p_content").value;
        if(!c) return alert("Write something first!");

        document.getElementById("postBtn").innerText = "Sharing...";
        await push(postsRef, {
            user: user,
            title: t,
            content: c,
            time: serverTimestamp()
        });

        document.getElementById("p_title").value = "";
        document.getElementById("p_content").value = "";
        document.getElementById("postBtn").innerText = "Share Story";
    };

    onValue(postsRef, (snap) => {
        let html = "";
        let data = snap.val();
        if(data) {
            Object.values(data).reverse().forEach(p => {
                html += `
                <div class="card">
                    <div class="post-header">
                        <img src="https://ui-avatars.com/api/?name=${p.user}&background=random" class="feed-avatar">
                        ${p.user}
                    </div>
                    <div class="story-body">
                        ${p.title ? `<div class="story-title">${p.title}</div>` : ''}
                        <div class="story-text">${p.content}</div>
                    </div>
                </div>`;
            });
        }
        document.getElementById("postFeed").innerHTML = html || "<p style='text-align:center'>No stories yet.</p>";
    });

    if(user) {
        document.getElementById("authBox").style.display = "none";
        document.getElementById("postBox").style.display = "block";
        document.getElementById("navUser").innerText = user;
    }
</script>
</body>
</html>
