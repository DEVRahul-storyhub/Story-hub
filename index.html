<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryHub - Likho Dil ki Baat</title>
    <style>
        :root { --primary: #0095f6; --border: rgba(255,255,255,0.2); }
        
        body { 
            margin: 0; 
            font-family: -apple-system, sans-serif;
            min-height: 100vh;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            transition: background 0.5s ease;
        }

        /* Sabke liye background (Login ke baad) */
        body.logged-in {
            /* Maine ye link online host kiya hai taaki sabko dikhe */
            background-image: url('https://i.ibb.co/Y76X66f/beach-pink.jpg'); 
        }

        body.logged-out {
            background: linear-gradient(135deg, #0095f6 0%, #001f3f 100%) fixed;
        }

        .navbar { 
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            color: white;
        }

        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }

        .card { 
            background: rgba(255, 255, 255, 0.9); /* Glass effect */
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid white;
        }

        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        
        button { 
            padding: 12px 24px; border: none; border-radius: 12px; 
            background: var(--primary); color: white; font-weight: bold; 
            cursor: pointer; transition: 0.3s;
        }

        .like-btn { 
            background: #f0f0f0; color: #262626; border: none; padding: 8px 15px; 
            border-radius: 20px; font-size: 16px; display: flex; align-items: center; gap: 8px;
        }
        .like-btn.active { background: #ffebed; color: #ed4956; font-weight: bold; }

        .post-user { font-weight: 800; color: #444; margin-bottom: 10px; display: block; }
    </style>
</head>
<body class="logged-out">

<div class="navbar">
    <div style="font-weight: 900; letter-spacing: 1px;">STORYHUB</div>
    <div id="navUser"></div>
</div>

<div class="container">
    <div class="card" id="authBox">
        <h2 style="margin-top:0; text-align:center;">Namaste! 🙏</h2>
        <input id="u_name" placeholder="Username (e.g. rahul)">
        <input id="u_pass" type="password" placeholder="Password">
        <button onclick="appLogin()" style="width:100%; margin-top:10px;">Dwar Kholein (Login)</button>
    </div>

    <div class="card" id="postBox" style="display:none;">
        <textarea id="p_content" rows="3" placeholder="Aaj aapke dil mein kya hai?"></textarea>
        <button onclick="handlePost()" style="width:100%">Post Karein</button>
    </div>

    <div id="postFeed"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzq2CZZhYFAh0hO-WoSb15yQGMb_9ECK8",
        authDomain: "devrahul-storyhub.firebaseapp.com",
        databaseURL: "https://devrahul-storyhub-default-rtdb.firebaseio.com/",
        projectId: "devrahul-storyhub",
        storageBucket: "devrahul-storyhub.firebasestorage.app",
        appId: "1:889951778018:web:7a01d97f72c016601d1abb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let loggedInUser = null;

    // --- Login/Signup Logic ---
    window.appLogin = async () => {
        const u = document.getElementById("u_name").value.trim();
        const p = document.getElementById("u_pass").value;
        if(!u || !p) return alert("Details bhariye!");
        
        try {
            await signInWithEmailAndPassword(auth, u + "@storyhub.com", p);
        } catch (e) {
            // Agar user nahi hai toh signup karlo automatically (Trial ke liye easy)
            try {
                const res = await createUserWithEmailAndPassword(auth, u + "@storyhub.com", p);
                await updateProfile(res.user, { displayName: u });
            } catch (err) { alert("Login failed!"); }
        }
    };

    window.appLogout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, (u) => {
        if (u) {
            loggedInUser = u;
            document.body.className = "logged-in"; 
            document.getElementById("authBox").style.display = "none";
            document.getElementById("postBox").style.display = "block";
            document.getElementById("navUser").innerHTML = `<button onclick="appLogout()" style="background:#ff4757">Logout</button>`;
            listenToPosts();
        }
    });

    // --- REALTIME FEED ---
    function listenToPosts() {
        onValue(ref(db, 'posts'), (snap) => {
            const data = snap.val();
            const list = data ? Object.keys(data).map(k => ({...data[k], id: k})).reverse() : [];
            renderFeed(list);
        });
    }

    function renderFeed(posts) {
        let html = "";
        posts.forEach(p => {
            const likesObj = p.likes || {};
            const isLiked = likesObj[loggedInUser.uid];
            const count = Object.keys(likesObj).length;
            
            html += `
            <div class="card">
                <span class="post-user">@${p.user}</span>
                <p style="font-size:18px; line-height:1.4;">${p.content}</p>
                <div style="margin-top:15px;">
                    <button class="like-btn ${isLiked ? 'active' : ''}" onclick="toggleLike('${p.id}')">
                        ${isLiked ? '❤️ Liked' : '🤍 Like'} <span>${count}</span>
                    </button>
                </div>
            </div>`;
        });
        document.getElementById("postFeed").innerHTML = html;
    }

    // --- LIKE FIX (PROPER) ---
    window.toggleLike = async (postId) => {
        const likeRef = ref(db, `posts/${postId}/likes/${loggedInUser.uid}`);
        
        // Local check to prevent flicker
        const snapshot = await get(likeRef);
        if (snapshot.exists()) {
            await remove(likeRef);
        } else {
            await set(likeRef, true);
        }
    };

    window.handlePost = () => {
        const c = document.getElementById("p_content").value;
        if(!c) return;
        push(ref(db, 'posts'), { 
            user: loggedInUser.displayName || loggedInUser.email.split('@')[0], 
            content: c, 
            uid: loggedInUser.uid,
            timestamp: Date.now()
        });
        document.getElementById("p_content").value = "";
    };
</script>
</body>
</html>
