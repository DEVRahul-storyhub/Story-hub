<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryHub - Likho Dil ki Baat</title>
    <style>
        :root { 
            --primary: #0095f6; 
            --bg: #fafafa; 
            --border: #dbdbdb; 
            --text: #262626; 
        }

        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); line-height: 1.5; }

        .navbar { 
            background: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; height: 60px; 
        }
        .nav-brand { font-size: 1.4rem; font-weight: 800; cursor: pointer; }

        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }

        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
        button.secondary { background: #efefef; color: black; }

        .post-header { display: flex; align-items: center; margin-bottom: 12px; font-weight: 600; cursor: pointer; }
        .feed-avatar { width: 34px; height: 34px; border-radius: 50%; margin-right: 10px; border: 1px solid #eee; }
        .post-img { width: calc(100% + 40px); margin: 10px -20px; display: block; border-top: 1px solid #efefef; border-bottom: 1px solid #efefef; }

        /* Comment Styling */
        .comment-box { margin-top: 15px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
        .comment-list { max-height: 150px; overflow-y: auto; margin-bottom: 10px; }
        .comment-item { font-size: 13px; margin-bottom: 5px; }
        .comment-user { font-weight: 700; margin-right: 6px; }
        .comment-input-area { display: flex; gap: 8px; }
        .comment-input-area input { margin: 0; padding: 8px; border-radius: 20px; font-size: 13px; }
        .comment-input-area button { padding: 0 15px; border-radius: 20px; font-size: 12px; }

        /* Profile Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; margin-top: 20px; }
        .grid-item { aspect-ratio: 1/1; background: #eee; overflow: hidden; cursor: pointer; border: 1px solid #f0f0f0; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-brand" onclick="location.reload()">StoryHub - Likho Dil ki Baat 📝</div>
    <div id="navUser"></div>
</div>

<div class="container">
    <!-- Auth -->
    <div class="card" id="authBox">
        <h2 style="margin-top:0">Swagat Hai!</h2>
        <input id="u_name" placeholder="Username">
        <input id="u_pass" type="password" placeholder="Password (Min 6 chars)">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <button onclick="appLogin()">Login</button>
            <button class="secondary" onclick="appSignup()">Sign Up</button>
        </div>
    </div>

    <!-- Post Area -->
    <div class="card" id="postBox" style="display:none;">
        <textarea id="p_content" rows="2" placeholder="Kuch likhiye..."></textarea>
        <input type="file" id="p_file" accept="image/*">
        <button onclick="handlePost()" style="width: 100%;">Post Story</button>
    </div>

    <div id="postFeed">Syncing stories...</div>
</div>

<!-- Profile Modal -->
<div id="profileModal" class="modal">
    <div style="padding: 20px; max-width: 600px; margin: auto;">
        <button class="secondary" onclick="closeModal('profileModal')">← Back</button>
        <div id="profileContent"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzq2CZZhYFAh0hO-WoSb15yQGMb_9ECK8",
        authDomain: "devrahul-storyhub.firebaseapp.com",
        databaseURL: "https://devrahul-storyhub-default-rtdb.firebaseio.com/",
        projectId: "devrahul-storyhub",
        storageBucket: "devrahul-storyhub.firebasestorage.app",
        messagingSenderId: "889951778018",
        appId: "1:889951778018:web:7a01d97f72c016601d1abb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allPosts = [];

    // --- AUTH FUNCTIONS ---
    window.appSignup = async () => {
        const u = document.getElementById("u_name").value.trim();
        const p = document.getElementById("u_pass").value;
        try {
            const res = await createUserWithEmailAndPassword(auth, u + "@storyhub.com", p);
            await updateProfile(res.user, { displayName: u });
            location.reload();
        } catch (e) { alert(e.message); }
    };

    window.appLogin = async () => {
        const u = document.getElementById("u_name").value.trim();
        const p = document.getElementById("u_pass").value;
        try { await signInWithEmailAndPassword(auth, u + "@storyhub.com", p); } catch (e) { alert("Invalid login!"); }
    };

    window.appLogout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById("authBox").style.display = "none";
            document.getElementById("postBox").style.display = "block";
            document.getElementById("navUser").innerHTML = `
                <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="openProfile('${user.displayName}')">
                    <img src="https://ui-avatars.com/api/?name=${user.displayName}&background=random" style="width:30px; border-radius:50%">
                    <span style="font-weight:600">${user.displayName}</span>
                    <button onclick="appLogout()" class="secondary" style="padding:4px 8px; font-size:11px">Logout</button>
                </div>`;
            fetchPosts();
        } else {
            document.getElementById("postFeed").innerHTML = "<p style='text-align:center; padding:20px;'>Login karke stories aur comments dekhein!</p>";
        }
    });

    // --- STORIES & COMMENTS ---
    function fetchPosts() {
        onValue(ref(db, 'posts'), (snap) => {
            const data = snap.val();
            allPosts = data ? Object.keys(data).map(k => ({...data[k], id: k})).reverse() : [];
            renderFeed();
        });
    }

    window.renderFeed = () => {
        let html = "";
        allPosts.forEach(p => {
            // Comments list render karna
            let commentsHtml = "";
            if(p.comments) {
                Object.values(p.comments).forEach(c => {
                    commentsHtml += `<div class="comment-item"><span class="comment-user">${c.user}:</span>${c.text}</div>`;
                });
            }

            html += `
            <div class="card" id="${p.id}">
                <div class="post-header" onclick="openProfile('${p.user}')">
                    <img src="https://ui-avatars.com/api/?name=${p.user}&background=random" class="feed-avatar">
                    <span>${p.user}</span>
                </div>
                <p style="white-space:pre-wrap">${p.content}</p>
                ${p.image ? `<img src="${p.image}" class="post-img">` : ""}
                
                <div class="comment-box">
                    <div class="comment-list" id="list-${p.id}">${commentsHtml}</div>
                    <div class="comment-input-area">
                        <input id="in-${p.id}" placeholder="Comment karein...">
                        <button onclick="postComment('${p.id}')">Post</button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById("postFeed").innerHTML = html || "Koi story nahi hai.";
    };

    window.postComment = async (postId) => {
        const input = document.getElementById(`in-${postId}`);
        if(!input.value.trim()) return;

        const commentObj = {
            user: currentUser.displayName,
            text: input.value,
            time: Date.now()
        };

        await push(ref(db, `posts/${postId}/comments`), commentObj);
        input.value = "";
    };

    // --- OTHER UI LOGIC ---
    window.handlePost = () => {
        const c = document.getElementById("p_content").value;
        const f = document.getElementById("p_file").files[0];
        if(!c && !f) return;

        if(f) {
            const r = new FileReader();
            r.onload = () => savePost(c, r.result);
            r.readAsDataURL(f);
        } else savePost(c, "");
    };

    async function savePost(content, img) {
        await push(ref(db, 'posts'), {
            user: currentUser.displayName,
            uid: currentUser.uid,
            content: content,
            image: img,
            timestamp: Date.now()
        });
        document.getElementById("p_content").value = "";
        document.getElementById("p_file").value = "";
    }

    window.openProfile = (u) => {
        let ups = allPosts.filter(x => x.user === u);
        document.getElementById("profileModal").style.display = "block";
        let grid = ups.map(p => `
            <div class="grid-item" onclick="viewPost('${p.id}')">
                ${p.image ? `<img src="${p.image}">` : `<div style="padding:10px; font-size:10px;">${p.content.slice(0,30)}...</div>`}
            </div>`).join("");
        
        document.getElementById("profileContent").innerHTML = `
            <div style="text-align:center; padding: 20px 0;">
                <img src="https://ui-avatars.com/api/?name=${u}&size=80&background=random" style="border-radius:50%">
                <h2>${u}</h2>
                <p>${ups.length} Stories Shared</p>
            </div>
            <div class="profile-grid">${grid}</div>`;
    };

    window.viewPost = (id) => { 
        closeModal('profileModal'); 
        setTimeout(() => {
            const el = document.getElementById(id);
            if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
        }, 300);
    };

    window.closeModal = (id) => document.getElementById(id).style.display = "none";

</script>
</body>
</html>
