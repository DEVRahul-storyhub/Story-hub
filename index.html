<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryHub - Likho Dil ki Baat</title>
    <style>
        :root { --primary: #0095f6; --bg: #fafafa; --border: #dbdbdb; --text: #262626; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.5; 
            transition: all 0.5s ease;
            min-height: 100vh;
        }

        /* --- BACKGROUND STATES --- */
        body.logged-out {
            background: linear-gradient(135deg, #0095f6 0%, #001f3f 100%) fixed;
            color: white;
        }

        body.logged-in {
            background: linear-gradient(to bottom, #fdfcf0 0%, #76d7ea 100%) fixed;
            color: #262626;
        }

        #authBox h2, #authBox p { color: #262626 !important; }

        .navbar { 
            background: white; padding: 0 20px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--border); 
            position: sticky; top: 0; z-index: 100; height: 60px; 
        }

        body.logged-out .navbar { background: transparent; border-bottom: none; color: white; }

        .nav-brand { font-size: 1.4rem; font-weight: 800; cursor: pointer; }

        /* --- LAYOUT STRUCTURE --- */
        .main-wrapper {
            display: flex;
            max-width: 900px;
            margin: 20px auto;
            gap: 20px;
            padding: 0 15px;
        }

        /* Sidebar Styling */
        .sidebar {
            flex: 1;
            display: none; /* Mobile par hide rakhenge */
        }

        .container { flex: 2; max-width: 500px; margin: 0; }

        @media (min-width: 800px) {
            .sidebar { display: block; position: sticky; top: 80px; height: fit-content; }
        }

        .sidebar-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: #262626;
        }

        .writer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: 0.2s;
        }
        .writer-item:hover { opacity: 0.7; }
        .writer-item:last-child { border: none; }

        /* CARD STYLING */
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            margin-bottom: 20px; 
            color: #262626;
        }

        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; color: #262626; }
        button { padding: 10px 20px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: 600; cursor: pointer; }
        button.secondary { background: #efefef; color: black; }
        
        .post-header { display: flex; align-items: center; margin-bottom: 12px; font-weight: 600; cursor: pointer; }
        .feed-avatar { width: 34px; height: 34px; border-radius: 50%; margin-right: 10px; border: 1px solid #eee; }
        .post-img { width: calc(100% + 40px); margin: 10px -20px; display: block; }
        .category-badge { background: #e0f2fe; color: #0369a1; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-bottom: 5px; display: inline-block; }

        .disclaimer-box { text-align: center; padding: 40px 15px; color: white; width: 100%; }

        .comment-box { margin-top: 15px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
        .comment-item { font-size: 13px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .comment-user { font-weight: 700; margin-right: 6px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; overflow-y: auto; color: #262626; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; margin-top: 20px; }
        .grid-item { aspect-ratio: 1/1; background: #eee; overflow: hidden; cursor: pointer; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="logged-out">

<div class="navbar">
    <div class="nav-brand" onclick="location.reload()">StoryHub - Likho Dil ki Baat 📝</div>
    <div id="navUser"></div>
</div>

<div class="main-wrapper">
    <!-- LEFT SIDEBAR: Story Writers List -->
    <div class="sidebar" id="sidebarArea" style="display:none;">
        <div class="sidebar-card">
            <h4 style="margin-top:0; border-bottom: 1px solid #eee; padding-bottom: 10px;">Story Writers ✍️</h4>
            <div id="writersList">Loading writers...</div>
        </div>
    </div>

    <div class="container">
        <div class="card" id="authBox">
            <h2 style="margin-top:0">Welcome! Dear Story Writers😊</h2>
            <input id="u_name" placeholder="Username">
            <input id="u_pass" type="password" placeholder="Password (Min 6 chars)">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                <button onclick="appLogin()">Login</button>
                <button class="secondary" onclick="appSignup()">Sign Up</button>
            </div>
        </div>

        <div class="card" id="postBox" style="display:none;">
            <input id="p_title" placeholder="Story Title">
            <select id="p_category">
                <option value="General">General</option>
                <option value="Love">Love</option>
                <option value="Inspiration">Inspiration</option>
                <option value="Sad">Sad</option>
                <option value="Comedy">Comedy</option>
            </select>
            <textarea id="p_content" rows="3" placeholder="Write your story here..."></textarea>
            <input type="file" id="p_file" accept="image/*">
            <button onclick="handlePost()" style="width: 100%;">Post Story</button>
        </div>

        <div id="postFeed">Syncing stories...</div>
    </div>
</div>

<div id="profileModal" class="modal">
    <div style="padding: 20px; max-width: 600px; margin: auto;">
        <button class="secondary" onclick="closeModal('profileModal')">← Back</button>
        <div id="profileContent"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzq2CZZhYFAh0hO-WoSb15yQGMb_9ECK8",
        authDomain: "devrahul-storyhub.firebaseapp.com",
        databaseURL: "https://devrahul-storyhub-default-rtdb.firebaseio.com/",
        projectId: "devrahul-storyhub",
        storageBucket: "devrahul-storyhub.firebasestorage.app",
        messagingSenderId: "889951778018",
        appId: "1:889951778018:web:7a01d97f72c016601d1abb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allPosts = [];

    // AUTH FUNCTIONS
    window.appSignup = async () => {
        const u = document.getElementById("u_name").value.trim();
        const p = document.getElementById("u_pass").value;
        if(!u || p.length < 6) return alert("Please enter valid username and password!");
        try {
            const res = await createUserWithEmailAndPassword(auth, u + "@storyhub.com", p);
            await updateProfile(res.user, { displayName: u });
            location.reload();
        } catch (e) { alert("Error: Account already exists!"); }
    };

    window.appLogin = async () => {
        const u = document.getElementById("u_name").value.trim();
        const p = document.getElementById("u_pass").value;
        try { await signInWithEmailAndPassword(auth, u + "@storyhub.com", p); } catch (e) { alert("Invalid credentials!"); }
    };

    window.appLogout = () => signOut(auth).then(() => location.reload());

    onAuthStateChanged(auth, (user) => {
        const body = document.body;
        if (user) {
            currentUser = user;
            body.classList.remove("logged-out");
            body.classList.add("logged-in");
            document.getElementById("authBox").style.display = "none";
            document.getElementById("postBox").style.display = "block";
            document.getElementById("sidebarArea").style.display = "block";
            document.getElementById("navUser").innerHTML = `
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="cursor:pointer; display:flex; align-items:center; gap:5px;" onclick="openProfile('${user.displayName}')">
                        <img src="https://ui-avatars.com/api/?name=${user.displayName}&background=random" style="width:30px; border-radius:50%">
                        <span style="font-weight:600">${user.displayName}</span>
                    </div>
                    <button onclick="appLogout()" class="secondary" style="padding:4px 8px; font-size:11px">Logout</button>
                </div>`;
            fetchPosts();
        } else {
            body.classList.remove("logged-in");
            body.classList.add("logged-out");
            document.getElementById("postBox").style.display = "none";
            document.getElementById("sidebarArea").style.display = "none";
            document.getElementById("authBox").style.display = "block";
            document.getElementById("navUser").innerHTML = "";

            document.getElementById("postFeed").innerHTML = `
                <div class="disclaimer-box">
                    <h1 style="font-size: 2.8rem; margin-bottom: 10px;">StoryHub - Likho Dil ki Baat</h1>
                    <p style="font-size: 1.2rem; opacity: 0.9;">Please login to see stories!</p>
                    <div style="width: 50px; height: 2px; background: white; margin: 20px auto;"></div>
                    <p style="font-style:italic; font-size: 0.9rem; opacity: 0.8;">
                        Note: You can login or sign up with any unique username and password. 
                        We do not collect your personal identity.
                    </p>
                </div>`;
        }
    });

    // DATABASE FUNCTIONS
    function fetchPosts() {
        onValue(ref(db, 'posts'), (snap) => {
            const data = snap.val();
            allPosts = data ? Object.keys(data).map(k => ({...data[k], id: k})).reverse() : [];
            renderFeed();
            renderWriters();
        });
    }

    // Sidebar writers rendering
    function renderWriters() {
        const writerCounts = {};
        allPosts.forEach(p => {
            writerCounts[p.user] = (writerCounts[p.user] || 0) + 1;
        });

        let html = "";
        Object.entries(writerCounts).sort((a,b) => b[1] - a[1]).forEach(([name, count]) => {
            html += `
                <div class="writer-item" onclick="openProfile('${name}')">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <img src="https://ui-avatars.com/api/?name=${name}&background=random" style="width:24px; border-radius:50%">
                        <span style="font-size:14px; font-weight:500;">${name}</span>
                    </div>
                    <span style="font-size:12px; color:#8e8e8e;">${count} posts</span>
                </div>`;
        });
        document.getElementById("writersList").innerHTML = html || "No writers yet.";
    }

    window.renderFeed = () => {
        let html = "";
        allPosts.forEach(p => {
            let commentsHtml = "";
            if (p.comments) {
                Object.keys(p.comments).forEach(cId => {
                    const c = p.comments[cId];
                    const isMyComment = currentUser && c.uid === currentUser.uid;
                    commentsHtml += `
                        <div class="comment-item">
                            <div><span class="comment-user">${c.user}</span><span>${c.text}</span></div>
                            ${isMyComment ? `<span style="color:red;cursor:pointer;font-size:10px" onclick="deleteComment('${p.id}', '${cId}')">Delete</span>` : ""}
                        </div>`;
                });
            }
            html += `
            <div class="card" id="${p.id}">
                <div class="post-header" onclick="openProfile('${p.user}')">
                    <img src="https://ui-avatars.com/api/?name=${p.user}&background=random" class="feed-avatar">
                    <span>${p.user}</span>
                </div>
                <div class="category-badge">${p.category || 'General'}</div>
                <h3 style="margin: 5px 0;">${p.title}</h3>
                <p style="white-space:pre-wrap;">${p.content}</p>
                ${p.image ? `<img src="${p.image}" class="post-img">` : ""}
                <div class="comment-box">
                    <div class="comment-list">${commentsHtml}</div>
                    <div style="display:flex;gap:5px">
                        <input id="in-${p.id}" placeholder="Comment..." style="margin:0">
                        <button onclick="postComment('${p.id}')">Post</button>
                    </div>
                </div>
            </div>`;
        });
        document.getElementById("postFeed").innerHTML = html || "No stories found.";
    };

    window.postComment = async (postId) => {
        const input = document.getElementById(`in-${postId}`);
        if(!input.value.trim()) return;
        await push(ref(db, `posts/${postId}/comments`), {
            user: currentUser.displayName, uid: currentUser.uid, text: input.value.trim()
        });
        input.value = "";
    };

    window.deleteComment = (pId, cId) => remove(ref(db, `posts/${pId}/comments/${cId}`));

    window.handlePost = () => {
        const title = document.getElementById("p_title").value;
        const cat = document.getElementById("p_category").value;
        const cont = document.getElementById("p_content").value;
        const file = document.getElementById("p_file").files[0];
        if(!cont) return alert("Write something!");
        if(file) {
            const r = new FileReader();
            r.onload = () => savePost(title, cat, cont, r.result);
            r.readAsDataURL(file);
        } else savePost(title, cat, cont, "");
    };

    async function savePost(t, cat, c, img) {
        await push(ref(db, 'posts'), {
            user: currentUser.displayName, uid: currentUser.uid,
            title: t, category: cat, content: c, image: img
        });
        alert("Posted!");
        // Clear inputs after post
        document.getElementById("p_title").value = "";
        document.getElementById("p_content").value = "";
        document.getElementById("p_file").value = "";
    }

    window.openProfile = (u) => {
        let ups = allPosts.filter(x => x.user === u);
        document.getElementById("profileModal").style.display = "block";
        let grid = ups.map(p => `<div class="grid-item" onclick="viewPost('${p.id}')">${p.image ? `<img src="${p.image}">` : `<div style="padding:10px; font-size:12px;">${p.title}</div>`}</div>`).join("");
        document.getElementById("profileContent").innerHTML = `<div style="text-align:center;padding:20px"><img src="https://ui-avatars.com/api/?name=${u}&size=80&background=random" style="border-radius:50%"><h2>${u}</h2><p>${ups.length} Stories</p></div><div class="profile-grid">${grid}</div>`;
    };

    window.viewPost = (id) => { closeModal('profileModal'); setTimeout(() => document.getElementById(id).scrollIntoView({behavior: 'smooth'}), 300); };
    window.closeModal = (id) => document.getElementById(id).style.display = "none";
</script>
</body>
</html>
