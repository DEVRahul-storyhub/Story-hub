<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryHub - Escape Into Stories</title>
    <style>
        :root { 
            --primary: #a855f7; 
            --dark-bg: #0f0720; 
            --accent: #1e113a;
            --text-light: #f3f4f6;
            --border: #dbdbdb; 
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background: var(--dark-bg); 
            color: var(--text-light); 
            line-height: 1.6; 
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        /* --- LOGGED OUT HERO LOOK --- */
        body.logged-out {
            background: linear-gradient(rgba(15, 7, 32, 0.7), rgba(15, 7, 32, 0.9)), 
                        url('https://images.unsplash.com/photo-1516410529446-2c777cb7366d?auto=format&fit=crop&q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
        }

        /* --- LOGGED IN USER LOOK (Aapki Image image_b88f4e.png) --- */
        body.logged-in {
            background: url('image_b88f4e.png') no-repeat center center fixed !important;
            background-size: 100% 100% !important; 
            color: #262626;
        }

        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; position: sticky; top: 0; z-index: 1000;
            background: rgba(15, 7, 32, 0.6); backdrop-filter: blur(15px);
        }
        body.logged-in .navbar { background: rgba(255, 255, 255, 0.9); color: #262626; border-bottom: 1px solid #ddd; }

        .nav-brand { font-size: 1.6rem; font-weight: 800; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        body.logged-in .nav-brand { color: #262626; }

        .hero-section {
            display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
            padding: 100px 8%; min-height: 70vh;
        }

        .hero-title { font-size: 4rem; font-weight: 700; margin-bottom: 10px; line-height: 1.1; max-width: 600px; }
        .hero-subtitle { font-size: 1.2rem; color: #ccc; margin-bottom: 30px; max-width: 500px; }

        /* Login Box styling to match premium look */
        .card { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        body.logged-in .card { background: #fff; color: #262626; border: 1px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        input, textarea, select { 
            width: 100%; padding: 14px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 12px; background: rgba(0,0,0,0.2); color: white; box-sizing: border-box;
        }
        body.logged-in input, body.logged-in textarea { background: #fff; color: #262626; border: 1px solid #ccc; }

        button { 
            padding: 14px 25px; border: none; border-radius: 12px; font-size: 1rem;
            background: var(--primary); color: white; font-weight: 600; cursor: pointer;
            transition: 0.3s; width: 100%;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4); }
        button.secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }

        .stats-bar {
            display: flex; gap: 50px; margin-top: 50px; padding: 20px 8%;
        }
        .stat-item { display: flex; align-items: center; gap: 15px; }
        .stat-item h3 { margin: 0; font-size: 1.5rem; }
        .stat-item p { margin: 0; color: #aaa; font-size: 0.9rem; }

        #bg-alphabets { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; display: none; }
        .letter { position: absolute; color: rgba(0, 0, 0, 0.08); font-weight: bold; font-size: 1.8rem; }

        /* Main feed hidden in logout */
        #mainContent { display: none; margin: 20px auto; max-width: 900px; gap: 20px; padding: 0 15px; }
        body.logged-in #mainContent { display: flex; }
        body.logged-in #heroArea { display: none; }
        body.logged-in #statsArea { display: none; }
        
        .sidebar { flex: 1; }
        .feed { flex: 2; max-width: 500px; }

        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .stats-bar { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body class="logged-out">

<div id="bg-alphabets"></div>

<nav class="navbar">
    <div class="nav-brand" onclick="location.reload()">✨ StoryHub</div>
    <div id="navUser">
        <button onclick="scrollToAuth()" style="width: auto; padding: 8px 20px;">Sign In</button>
    </div>
</nav>

<!-- HERO SECTION FOR LOGOUT -->
<div id="heroArea" class="hero-section">
    <h1 class="hero-title">Escape<br>Into Stories</h1>
    <p class="hero-subtitle">Find your next adventure, escape, and inspiration in a story written by people like you.</p>
    
    <div class="card" id="authBox">
        <h3 style="margin-top:0">Join the Community</h3>
        <input id="u_name" placeholder="Username">
        <input id="u_pass" type="password" placeholder="Password (Min 6 chars)">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <button onclick="appLogin()">Login</button>
            <button class="secondary" onclick="appSignup()">Sign Up</button>
        </div>
    </div>
</div>

<div id="statsArea" class="stats-bar">
    <div class="stat-item"><h3>📖 10K+</h3><p>Stories</p></div>
    <div class="stat-item"><h3>👥 25K+</h3><p>Readers</p></div>
    <div class="stat-item"><h3>✍️ 100+</h3><p>Authors</p></div>
</div>

<!-- MAIN FEED FOR LOGIN -->
<div id="mainContent" class="main-wrapper">
    <div class="sidebar">
        <div class="card" style="background: rgba(255,255,255,0.95); margin-bottom: 20px;">
            <h4 style="margin-top:0">Categories 📚</h4>
            <div id="categoriesList">Loading...</div>
        </div>
    </div>
    <div class="feed">
        <div class="card" id="postBox" style="background: rgba(255,255,255,0.95);">
            <input id="p_title" placeholder="Story Title">
            <textarea id="p_content" rows="3" placeholder="Write your story..."></textarea>
            <button onclick="handlePost()">Post Story</button>
        </div>
        <div id="postFeed"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzq2CZZhYFAh0hO-WoSb15yQGMb_9ECK8",
        authDomain: "devrahul-storyhub.firebaseapp.com",
        databaseURL: "https://devrahul-storyhub-default-rtdb.firebaseio.com/",
        projectId: "devrahul-storyhub",
        storageBucket: "devrahul-storyhub.firebasestorage.app",
        messagingSenderId: "889951778018",
        appId: "1:889951778018:web:7a01d97f72c016601d1abb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUser = null;

    // Fixed Alphabets Logic
    function initAlphabetBackground() {
        const container = document.getElementById('bg-alphabets');
        container.innerHTML = '';
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ📝✍️📖";
        for (let i = 0; i < 40; i++) {
            const span = document.createElement('span');
            span.className = 'letter';
            span.innerText = chars[Math.floor(Math.random() * chars.length)];
            span.style.left = Math.random() * 95 + "vw";
            span.style.top = Math.random() * 95 + "vh";
            span.style.transform = `rotate(${Math.random() * 360}deg)`;
            container.appendChild(span);
        }
    }

    onAuthStateChanged(auth, (user) => {
        const body = document.body;
        if (user) {
            currentUser = user;
            body.className = "logged-in";
            document.getElementById("bg-alphabets").style.display = "block";
            initAlphabetBackground();
            document.getElementById("navUser").innerHTML = `<button onclick="signOut(auth)" style="width:auto; background:#eee; color:black">Logout</button>`;
            fetchPosts();
        } else {
            body.className = "logged-out";
            document.getElementById("bg-alphabets").style.display = "none";
        }
    });

    window.appLogin = async () => {
        const u = document.getElementById("u_name").value.trim();
        const p = document.getElementById("u_pass").value;
        try { await signInWithEmailAndPassword(auth, u + "@storyhub.com", p); } catch (e) { alert("Invalid login!"); }
    };

    window.appSignup = async () => {
        const u = document.getElementById("u_name").value.trim();
        const p = document.getElementById("u_pass").value;
        try { 
            const res = await createUserWithEmailAndPassword(auth, u + "@storyhub.com", p);
            await updateProfile(res.user, { displayName: u });
            location.reload();
        } catch (e) { alert("Error signing up!"); }
    };

    window.scrollToAuth = () => {
        document.getElementById("authBox").scrollIntoView({behavior: 'smooth'});
    };

    function fetchPosts() {
        onValue(ref(db, 'posts'), (snap) => {
            const data = snap.val();
            let html = "";
            if(data) {
                Object.keys(data).reverse().forEach(id => {
                    const p = data[id];
                    html += `<div class="card" style="background:#fff; margin-bottom:15px; color:#262626;">
                        <strong>${p.user}</strong>
                        <h3>${p.title || 'Untitled'}</h3>
                        <p>${p.content}</p>
                    </div>`;
                });
            }
            document.getElementById("postFeed").innerHTML = html || "No stories yet.";
        });
    }

    window.handlePost = async () => {
        const title = document.getElementById("p_title").value;
        const cont = document.getElementById("p_content").value;
        if(!cont) return;
        await push(ref(db, 'posts'), { user: currentUser.displayName, title, content: cont });
        document.getElementById("p_title").value = "";
        document.getElementById("p_content").value = "";
    };
</script>

</body>
</html>
