<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryHub - Likho Dil ki Baat</title>
    <style>
        :root { 
            --primary: #a855f7; 
            --dark-bg: #0f0720; 
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.15);
        }
        
        body, html { margin: 0; padding: 0; width: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* --- BACKGROUNDS --- */
        body.logged-out {
            background: linear-gradient(rgba(15, 7, 32, 0.85), rgba(15, 7, 32, 0.95)), 
                        url('https://images.unsplash.com/photo-1516410529446-2c777cb7366d?auto=format&fit=crop&q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: white;
            overflow: hidden; /* Home page fixed */
        }

        body.logged-in {
            background: url('image_b88f4e.png') no-repeat center center fixed !important;
            background-size: cover !important; 
            color: #000000 !important;
            overflow-y: auto;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; height: 65px; position: sticky; top:0; z-index: 1000;
            background: rgba(15, 7, 32, 0.7); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            color: white;
        }
        .nav-brand { font-size: 1.5rem; font-weight: 800; color: #fff; cursor: pointer; letter-spacing: -1px; }

        /* --- HERO SECTION (Original Restored) --- */
        #loggedOutUI {
            height: calc(100vh - 65px);
            display: flex; flex-direction: column; justify-content: center;
            padding: 0 5%;
        }
        .hero-container { display: flex; align-items: center; justify-content: space-between; gap: 50px; }
        .hero-title { font-size: 5rem; font-weight: 800; color: #fff; line-height: 1.1; margin: 0; }
        .hero-subtitle { color: #aaa; font-size: 1.4rem; margin: 20px 0 40px 0; max-width: 500px; }
        
        .auth-card { 
            width: 400px; background: var(--glass-bg); 
            padding: 40px; border-radius: 28px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* --- MAIN FEED LAYOUT --- */
        .main-wrapper { display: none; max-width: 1100px; margin: 30px auto; gap: 25px; padding: 0 20px; }
        body.logged-in .main-wrapper { display: flex; }
        
        /* Sidebar scrolls with feed now */
        .sidebar { width: 280px; height: auto; } 
        .container { flex: 1; max-width: 680px; }

        .card { 
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            padding: 25px; border-radius: 20px; border: 1px solid rgba(0,0,0,0.1); 
            margin-bottom: 25px; transition: 0.3s ease;
            color: #000000;
        }
        
        .stat-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s;
            margin-bottom: 8px; font-size: 15px;
            color: #000000;
            background: rgba(0,0,0,0.03);
        }
        .stat-item:hover { background: rgba(0,0,0,0.08); transform: translateX(5px); color: var(--primary); }

        input, textarea, select { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border: 1px solid rgba(0,0,0,0.1); border-radius: 14px; 
            background: rgba(255,255,255,0.6); color: #000; outline: none;
            box-sizing: border-box;
        }
        
        button { 
            width: 100%; padding: 15px; border: none; border-radius: 14px; 
            font-weight: 700; background: var(--primary); color: white; 
            cursor: pointer; transition: 0.3s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .post-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; cursor: pointer; color: #000; }
        .feed-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); }
        .post-img { width: calc(100% + 50px); margin: 20px -25px; display: block; max-height: 500px; object-fit: cover; }
        .category-badge { display: inline-block; background: var(--primary); color: white; padding: 5px 15px; border-radius: 25px; font-size: 11px; font-weight: 800; text-transform: uppercase; }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; padding: 40px; color: black; }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .grid-item { background: rgba(0,0,0,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; color: black; }

        @media (max-width: 900px) {
            .hero-container { flex-direction: column; text-align: center; }
            .main-wrapper { flex-direction: column; }
            .sidebar { width: 100%; order: 2; }
            .container { width: 100%; order: 1; }
            .hero-title { font-size: 3.5rem; }
            body.logged-out { overflow-y: auto; }
        }
    </style>
</head>
<body class="logged-out">

<nav class="navbar">
    <div class="nav-brand" onclick="location.reload()">StoryHub - Likho Dil ki Baat 📝</div>
    <div id="navUser"></div>
</nav>

<!-- ORIGINAL HOME PAGE DESIGN -->
<div id="loggedOutUI">
    <div class="hero-container">
        <div class="hero-text">
            <h1 class="hero-title">Your Stories,<br>Your World.</h1>
            <p class="hero-subtitle">The ultimate platform for writers and dreamers. Join the community and start your journey today.</p>
        </div>
        <div class="auth-card">
            <h3 style="margin-top:0; color: white;">Welcome Back</h3>
            <input id="u_name" placeholder="Username">
            <input id="u_pass" type="password" placeholder="Password">
            <button onclick="appLogin()">Sign In</button>
            <button style="background:transparent; border:1px solid var(--glass-border); margin-top:10px" onclick="appSignup()">Create New Account</button>
        </div>
    </div>
</div>

<!-- APP UI -->
<div class="main-wrapper">
    <!-- Sidebar: Now scrolls with the feed -->
    <div class="sidebar">
        <div class="card">
            <h4 style="margin:0 0 15px 0; color:var(--primary); font-size: 1.2rem;">Top Storytellers ✍️</h4>
            <div id="writersList"></div>
        </div>

        <div class="card">
            <h4 style="margin:0 0 15px 0; color:var(--primary); font-size: 1.2rem;">Browse Genres 📚</h4>
            <div id="categoriesList"></div>
        </div>
    </div>

    <!-- Feed -->
    <div class="container">
        <div class="card" style="border-left: 5px solid var(--primary);">
            <h3 style="margin-top:0">Write a Story</h3>
            <input id="p_title" placeholder="Catchy Title...">
            <select id="p_category">
                <option value="General">Select Category</option>
                <option value="Romance">Romance ❤️</option>
                <option value="Thriller">Thriller 🔪</option>
                <option value="Inspiration">Inspiration ✨</option>
                <option value="Horror">Horror 👻</option>
                <option value="Adult/Sex">Adult/Sex 🔥</option>
            </select>
            <textarea id="p_content" rows="4" placeholder="Deep dive into your imagination..."></textarea>
            <input type="file" id="p_file" accept="image/*" style="font-size:12px">
            <button onclick="handlePost()">Publish Story</button>
        </div>
        <div id="postFeed"></div>
    </div>
</div>

<!-- MODAL WINDOW -->
<div id="appModal" class="modal">
    <div style="max-width: 900px; margin: auto;">
        <button onclick="closeModal()" style="width:auto; padding:10px 25px; background:rgba(0,0,0,0.1); margin-bottom:30px; border:none; border-radius:8px; cursor:pointer">← Back to Home</button>
        <div id="modalBody"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzq2CZZhYFAh0hO-WoSb15yQGMb_9ECK8",
        authDomain: "devrahul-storyhub.firebaseapp.com",
        databaseURL: "https://devrahul-storyhub-default-rtdb.firebaseio.com/",
        projectId: "devrahul-storyhub",
        storageBucket: "devrahul-storyhub.firebasestorage.app",
        appId: "1:889951778018:web:7a01d97f72c016601d1abb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let currentUser = null;
    let allPosts = [];

    // --- AUTH ---
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.body.className = "logged-in";
            document.getElementById("loggedOutUI").style.display = "none";
            document.getElementById("navUser").innerHTML = `
                <span style="font-weight:bold; margin-right:15px">@${user.displayName}</span>
                <button onclick="logout()" style="width:auto; padding:5px 15px; font-size:12px; background:rgba(255,0,0,0.7); color:white; border:none; border-radius:5px; cursor:pointer">Logout</button>
            `;
            loadStories();
        } else {
            document.body.className = "logged-out";
            document.getElementById("loggedOutUI").style.display = "flex";
        }
    });

    window.appLogin = () => {
        const u = document.getElementById("u_name").value;
        const p = document.getElementById("u_pass").value;
        signInWithEmailAndPassword(auth, u + "@storyhub.com", p).catch(() => alert("Error Logging In"));
    };

    window.appSignup = async () => {
        const u = document.getElementById("u_name").value;
        const p = document.getElementById("u_pass").value;
        try {
            const res = await createUserWithEmailAndPassword(auth, u + "@storyhub.com", p);
            await updateProfile(res.user, { displayName: u });
            location.reload();
        } catch(e) { alert("Signup Failed"); }
    };

    window.logout = () => signOut(auth).then(() => location.reload());

    // --- DATA ---
    function loadStories() {
        onValue(ref(db, 'posts'), (snap) => {
            const data = snap.val();
            allPosts = data ? Object.keys(data).map(k => ({...data[k], id: k})).reverse() : [];
            renderMainFeed();
            updateSidebarStats();
        });
    }

    function renderMainFeed() {
        const feed = document.getElementById("postFeed");
        feed.innerHTML = allPosts.map(p => `
            <div class="card">
                <div class="post-header" onclick="viewUserStories('${p.user}')">
                    <img src="https://ui-avatars.com/api/?name=${p.user}&background=a855f7&color=fff" class="feed-avatar">
                    <strong>@${p.user}</strong>
                </div>
                <div class="category-badge">${p.category}</div>
                <h2 style="margin:10px 0; cursor:pointer" onclick="viewFullStory('${p.id}')">${p.title}</h2>
                <p style="opacity:0.9">${p.content.substring(0, 200)}...</p>
                ${p.image ? `<img src="${p.image}" class="post-img">` : ''}
                <button onclick="viewFullStory('${p.id}')" style="width:auto; margin-top:15px">Read More</button>
            </div>
        `).join("");
    }

    function updateSidebarStats() {
        const writers = {}, cats = {};
        allPosts.forEach(p => {
            writers[p.user] = (writers[p.user] || 0) + 1;
            cats[p.category] = (cats[p.category] || 0) + 1;
        });

        document.getElementById("writersList").innerHTML = Object.entries(writers).slice(0, 10).map(([name, count]) => `
            <div class="stat-item" onclick="viewUserStories('${name}')">
                <span>@${name}</span>
                <span style="font-weight:bold">${count}</span>
            </div>
        `).join("");

        document.getElementById("categoriesList").innerHTML = Object.entries(cats).map(([name, count]) => `
            <div class="stat-item" onclick="viewCategoryGrid('${name}')">
                <span># ${name}</span>
                <span style="font-weight:bold">${count}</span>
            </div>
        `).join("");
    }

    // --- MODAL LOGIC ---
    window.viewUserStories = (username) => {
        const userStories = allPosts.filter(p => p.user === username);
        const html = `
            <div style="text-align:center; margin-bottom:40px">
                <img src="https://ui-avatars.com/api/?name=${username}&size=100" style="border-radius:50%; border:3px solid var(--primary)">
                <h1>Stories by @${username}</h1>
                <p>${userStories.length} Published Tales</p>
            </div>
            <div class="grid-view">
                ${userStories.map(p => `
                    <div class="grid-item" onclick="viewFullStory('${p.id}')">
                        <div class="category-badge">${p.category}</div>
                        <h3>${p.title}</h3>
                        <p style="font-size:13px; opacity:0.8">${p.content.substring(0, 80)}...</p>
                    </div>
                `).join("")}
            </div>
        `;
        openModal(html);
    };

    window.viewCategoryGrid = (category) => {
        const catStories = allPosts.filter(p => p.category === category);
        const html = `
            <h1 style="border-bottom: 2px solid var(--primary); padding-bottom:10px">Genre: ${category}</h1>
            <div class="grid-view">
                ${catStories.map(p => `
                    <div class="grid-item" onclick="viewFullStory('${p.id}')">
                        <p><strong>@${p.user}</strong></p>
                        <h3>${p.title}</h3>
                        <p style="font-size:13px; opacity:0.8">${p.content.substring(0, 100)}...</p>
                    </div>
                `).join("")}
            </div>
        `;
        openModal(html);
    };

    window.viewFullStory = (id) => {
        const p = allPosts.find(item => item.id === id);
        const html = `
            <div class="card" style="background:white; padding:40px; border:none; box-shadow:0 10px 30px rgba(0,0,0,0.1)">
                <div class="category-badge" style="margin-bottom:20px">${p.category}</div>
                <h1 style="font-size:3rem; margin:0">${p.title}</h1>
                <p style="font-size:1.2rem; color:var(--primary)">Author: @${p.user}</p>
                <hr style="border:0; border-top:1px solid rgba(0,0,0,0.1); margin:30px 0">
                ${p.image ? `<img src="${p.image}" style="width:100%; border-radius:20px; margin-bottom:30px">` : ''}
                <div style="font-size:1.3rem; line-height:1.8; white-space:pre-wrap; color:#000">${p.content}</div>
            </div>
        `;
        openModal(html);
    };

    // --- UTILS ---
    window.handlePost = async () => {
        const t = document.getElementById("p_title").value;
        const c = document.getElementById("p_content").value;
        const cat = document.getElementById("p_category").value;
        const file = document.getElementById("p_file").files[0];

        if(!t || !c) return alert("Title and Content are required!");

        const postObj = { user: currentUser.displayName, uid: currentUser.uid, title: t, content: c, category: cat, time: Date.now() };

        if(file) {
            const reader = new FileReader();
            reader.onload = () => { postObj.image = reader.result; push(ref(db, 'posts'), postObj); };
            reader.readAsDataURL(file);
        } else {
            await push(ref(db, 'posts'), postObj);
        }

        document.getElementById("p_title").value = "";
        document.getElementById("p_content").value = "";
    };

    function openModal(content) {
        document.getElementById("modalBody").innerHTML = content;
        document.getElementById("appModal").style.display = "block";
        document.body.style.overflow = "hidden";
    }

    window.closeModal = () => {
        document.getElementById("appModal").style.display = "none";
        document.body.style.overflow = "auto";
    };
</script>
</body>
</html>
